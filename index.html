<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ito Online - 価値観共有ゲーム</title>
    <!-- 安定版Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f0f9ff; color: #1e293b; }
        .card-custom { background: white; border-radius: 2.5rem; box-shadow: 0 10px 0 #e0f2fe; }
        .btn-primary { background-color: #0ea5e9; color: white; border-radius: 1.25rem; box-shadow: 0 6px 0 #0284c7; transition: all 0.1s; font-weight: 900; }
        .btn-primary:active { box-shadow: none; transform: translateY(4px); }
        .btn-primary:disabled { background-color: #cbd5e1; box-shadow: 0 6px 0 #94a3b8; cursor: not-allowed; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .input-custom { background-color: #f8fafc; border: 2px solid transparent; border-radius: 1.25rem; padding: 1rem 1.5rem; width: 100%; outline: none; font-weight: 700; transition: border-color 0.2s; }
        .input-custom:focus { border-color: #38bdf8; background-color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Firebase SDKs (最新の 12.8.0 を使用)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-analytics.js";

        // ==========================================================
        // Firebase Configuration (最新のご提供情報を反映)
        // ==========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBTrSDQ7koMGWScUpoO77R0jBnfd6e65l4",
            authDomain: "ito-game-8287f.firebaseapp.com",
            projectId: "ito-game-8287f",
            storageBucket: "ito-game-8287f.firebasestorage.app",
            messagingSenderId: "258676882144",
            appId: "1:258676882144:web:7a0cd577a60a979012ee85",
            measurementId: "G-G24ZFJB5FZ"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        const { useState, useEffect } = React;
        const appIdPrefix = "ito-shared-v1";

        // --- SVG Icons ---
        const Icons = {
            Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Star: ({ className }) => <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Refresh: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            Eye: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
            EyeOff: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>,
            Send: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Maximize: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>,
            Minimize: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v5H3"/><path d="M16 3v5h5"/><path d="M3 16h5v5"/><path d="M21 16h5v5"/></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const THEMES = [
            "食べ物の人気度", "無人島に持っていきたいもの", "一生に一度はやってみたいこと",
            "おにぎりの具の強さ", "コンビニでつい買ってしまうもの", "かっこいい職業",
            "最強の超能力", "あったら嬉しい未来の道具", "幸せを感じる瞬間",
            "お弁当のおかず", "動物の強さ", "カバンにあると便利なもの",
            "言われて嬉しい言葉", "冬に食べたくなるもの", "住んでみたい場所"
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [joinedRoom, setJoinedRoom] = useState(null);
            const [roomID, setRoomID] = useState('');
            const [userName, setUserName] = useState(localStorage.getItem('ito_v7_name') || '');
            const [roomData, setRoomData] = useState(null);
            const [isNumberVisible, setIsNumberVisible] = useState(false);
            const [answer, setAnswer] = useState('');
            const [isLargeDisplay, setIsLargeDisplay] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) { console.error(e); }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsLoading(false);
                });
            }, []);

            useEffect(() => {
                if (!user || !joinedRoom || !db) return;
                const roomRef = doc(db, 'rooms', joinedRoom);
                return onSnapshot(roomRef, (s) => {
                    if (s.exists()) setRoomData(s.data());
                }, (err) => console.error("Firestore Error:", err));
            }, [user, joinedRoom]);

            const handleJoin = async () => {
                if (!user || !roomID.trim() || !userName.trim() || !db) return;
                const cid = roomID.trim().toLowerCase();
                localStorage.setItem('ito_v7_name', userName);
                
                const roomRef = doc(db, 'rooms', cid);
                const snap = await getDoc(roomRef);
                const p = { uid: user.uid, name: userName };

                if (!snap.exists()) {
                    await setDoc(roomRef, {
                        status: 'waiting', players: [p],
                        theme: THEMES[Math.floor(Math.random() * THEMES.length)],
                        numbers: {}, answers: {}, updatedAt: Date.now()
                    });
                } else if (!snap.data().players.find(x => x.uid === user.uid)) {
                    await updateDoc(roomRef, { players: arrayUnion(p), updatedAt: Date.now() });
                }
                setJoinedRoom(cid);
            };

            const startGame = async () => {
                if (!roomData || !db) return;
                const ns = Array.from({ length: 100 }, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                const assigned = {};
                roomData.players.forEach((p, i) => assigned[p.uid] = ns[i]);
                await updateDoc(doc(db, 'rooms', joinedRoom), {
                    status: 'playing', numbers: assigned, answers: {}, updatedAt: Date.now()
                });
                setIsNumberVisible(false);
                setAnswer('');
            };

            const changeTheme = async () => {
                if (!db) return;
                const nt = THEMES[Math.floor(Math.random() * THEMES.length)];
                await updateDoc(doc(db, 'rooms', joinedRoom), { theme: nt });
            };

            const submitAnswer = async () => {
                if (!answer.trim() || !db) return;
                await updateDoc(doc(db, 'rooms', joinedRoom), { [`answers.${user.uid}`]: answer.trim() });
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center text-sky-500 font-black animate-pulse text-xl">CONNECTING...</div>;

            if (!joinedRoom) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="w-full max-w-md card-custom p-10 animate-pop text-center">
                        <div className="bg-blue-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 transform rotate-3 shadow-inner">
                            <Icons.Star className="text-blue-400" />
                        </div>
                        <h1 className="text-4xl font-black text-blue-600 italic tracking-tighter mb-2">ito Online</h1>
                        <p className="text-blue-300 font-bold text-sm mb-8 italic">価値観を合わせて数字を繋ごう</p>
                        <div className="space-y-4 text-left">
                            <div>
                                <label className="text-[10px] font-black text-slate-300 ml-4 uppercase tracking-widest">Your Name</label>
                                <input className="input-custom text-lg mt-1" placeholder="なまえ" value={userName} onChange={e => setUserName(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-300 ml-4 uppercase tracking-widest">Secret Word</label>
                                <input className="input-custom text-lg mt-1" placeholder="部屋の合言葉" value={roomID} onChange={e => setRoomID(e.target.value)} />
                            </div>
                            <button className="btn-primary w-full py-5 text-xl mt-4" disabled={!userName || !roomID} onClick={handleJoin}>あそびをはじめる</button>
                        </div>
                    </div>
                </div>
            );

            const myNum = roomData?.numbers?.[user?.uid];
            const myAns = roomData?.answers?.[user?.uid];

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <div className="w-full max-w-lg space-y-6">
                        <div className="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-blue-50">
                            <div className="flex items-center gap-2 font-black text-blue-500">
                                <Icons.Users /> <span>{roomData?.players?.length || 0}人 参加中</span>
                            </div>
                            <div className="text-[10px] font-black text-slate-300">ID: {joinedRoom}</div>
                        </div>

                        <div className="card-custom p-8 text-center relative overflow-hidden">
                            <span className="text-blue-300 text-[10px] font-black uppercase tracking-widest block mb-2">Theme</span>
                            <h2 className="text-2xl font-black text-slate-800 leading-tight mb-6">{roomData?.theme}</h2>
                            <button onClick={changeTheme} className="bg-blue-50 hover:bg-blue-100 text-blue-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 mx-auto transition-colors">
                                <Icons.Refresh /> お題を変える
                            </button>
                        </div>

                        {roomData?.status === 'playing' ? (
                            <div className="space-y-6 animate-pop">
                                <div className="card-custom p-8 border-b-8 border-green-50">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="text-green-500 text-[10px] font-black uppercase tracking-widest">Secret Number</span>
                                        <button onClick={() => setIsNumberVisible(!isNumberVisible)} className={`px-5 py-2 rounded-xl text-xs font-black transition-all ${isNumberVisible ? 'bg-slate-100 text-slate-400' : 'bg-green-500 text-white shadow-lg'}`}>
                                            <div className="flex items-center gap-2">{isNumberVisible ? <Icons.EyeOff /> : <Icons.Eye />} {isNumberVisible ? '隠す' : '確認'}</div>
                                        </button>
                                    </div>
                                    <div className="flex justify-center py-4">
                                        {isNumberVisible ? <div className="text-9xl font-black text-green-500 animate-pop">{myNum}</div> : <div className="w-32 h-32 bg-slate-50 rounded-3xl border-4 border-dashed border-slate-200 flex items-center justify-center text-slate-200 text-6xl font-black">?</div>}
                                    </div>
                                </div>

                                <div className="card-custom p-8 border-b-8 border-yellow-50">
                                    <span className="text-yellow-500 text-[10px] font-black uppercase tracking-widest block mb-4">Your Answer</span>
                                    <div className="flex gap-2">
                                        <input className="input-custom" placeholder="例えを入力" value={answer} onChange={e => setAnswer(e.target.value)} />
                                        <button onClick={submitAnswer} className="bg-yellow-400 text-white px-6 rounded-xl font-black shadow-md transition-transform active:scale-95"><Icons.Send /></button>
                                    </div>
                                    {myAns && <p className="text-[10px] text-green-500 font-black mt-3 flex items-center gap-1"><Icons.Check /> 送信済み: {myAns}</p>}
                                </div>

                                <button onClick={() => setIsLargeDisplay(true)} className="w-full bg-slate-800 text-white py-6 rounded-3xl font-black text-lg shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                                    <Icons.Maximize /> 全画面で見せる
                                </button>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center py-8 text-center animate-pop">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl w-full mb-8">
                                    <h3 className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6 text-center">待機中メンバー</h3>
                                    <div className="space-y-3">
                                        {roomData?.players?.map((p, i) => (
                                            <div key={i} className="bg-blue-50 text-blue-600 px-6 py-4 rounded-2xl font-black text-lg border border-blue-100 animate-pop">{p.name} {p.uid === user.uid && "(自分)"}</div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={startGame} className="btn-primary px-16 py-6 text-2xl">全員そろった！</button>
                            </div>
                        )}
                        
                        {roomData?.status === 'playing' && (
                            <button onClick={startGame} className="text-slate-300 hover:text-blue-400 text-xs font-black flex items-center gap-2 mx-auto mt-8 pb-10"><Icons.Refresh /> 新しいゲームをはじめる</button>
                        )}
                    </div>

                    {isLargeDisplay && (
                        <div className="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-10 text-center animate-pop">
                            <div className="text-blue-300 text-xl font-black tracking-widest mb-12 border-b-4 border-blue-50 pb-2 uppercase">{userName}'s Answer</div>
                            <div className="text-6xl sm:text-9xl font-black text-slate-800 break-words max-w-full mb-20 leading-tight italic uppercase drop-shadow-md">{myAns || answer || "???"}</div>
                            <button onClick={() => setIsLargeDisplay(false)} className="bg-slate-800 text-white px-12 py-6 rounded-3xl font-black flex items-center gap-4 text-xl shadow-2xl"><Icons.Minimize /> とじる</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
